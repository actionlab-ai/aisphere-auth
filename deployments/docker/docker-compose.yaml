services:
  postgres:
    image: postgres:16
    container_name: aisphere-auth-postgres
    environment:
      POSTGRES_USER: aisphere_auth
      POSTGRES_PASSWORD: CHANGE_ME_PASSWORD
      POSTGRES_DB: aisphere_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisphere_auth -d aisphere_auth"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aisphere-auth-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  aisphere-auth:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: aisphere-auth
    restart: unless-stopped
    environment:
      AISPHERE_AUTH_ADDR: ":18080"
      AISPHERE_AUTH_MODE: "debug"
      AISPHERE_AUTH_PUBLIC_BASE_URL: "http://127.0.0.1:18080"
      AISPHERE_SESSION_PROVIDER: "redis"
      AISPHERE_IAM_PROVIDER: "postgres"
      AISPHERE_DATABASE_DRIVER: "postgres"
      AISPHERE_DATABASE_DSN: "postgres://aisphere_auth:CHANGE_ME_PASSWORD@postgres:5432/aisphere_auth?sslmode=disable"
      AISPHERE_REDIS_ADDRS: "redis:6379"
      AISPHERE_REDIS_PREFIX: "aisphere"
      AISPHERE_CASDOOR_ENDPOINT: "http://host.docker.internal:8000"
      AISPHERE_CASDOOR_OWNER: "aisphere"
      AISPHERE_CASDOOR_APPLICATION: "aisphere"
      AISPHERE_CASDOOR_CLIENT_ID: "change-me"
      AISPHERE_CASDOOR_CLIENT_SECRET: "change-me"
      AISPHERE_CASDOOR_REDIRECT_URL: "http://127.0.0.1:18080/auth/callback/casdoor"
      AISPHERE_CASDOOR_PERMISSION_ID: "aisphere/perm_aihub_admin"
      AISPHERE_SERVICE_TOKEN_REQUIRED: "true"
      AISPHERE_SERVICE_TOKEN: "dev-service-token-change-me-please-rotate"
      AISPHERE_SERVICE_TOKEN_HEADER: "X-Aisphere-Service-Token"
      AISPHERE_INTERNAL_RATE_LIMIT_ENABLED: "true"
      AISPHERE_INTERNAL_RATE_LIMIT_QPS: "100"
      AISPHERE_INTERNAL_RATE_LIMIT_BURST: "200"
    ports:
      - "18080:18080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/aisphere-auth", "check-config"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
