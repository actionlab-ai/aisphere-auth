name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Resolve modules
        shell: bash
        run: |
          go mod download
          go mod verify

      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
          if [ -n "$files" ]; then
            echo "Go files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
